<!DOCTYPE html>
<html>
<head>
<title>Image Caption Generator</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
body {
    font-family: 'Poppins', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #ffe2dc 0%, #ffb3a7 45%, #ffdedd 100%);
    color: #222233;
    margin: 0;
    padding: 0;
    min-height: 100vh;
    scroll-behavior: smooth;
}

.welcome {
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    color: #fff;
    position: relative;
    overflow: hidden;
}

.welcome::before {
    content: "";
    position: absolute;
    inset: 0;
    background: rgba(255, 255, 255, 0.35);
    pointer-events: none;
}

.welcome h1 {
    font-size: 4em;
    font-weight: 700;
    margin: 0;
    color: rgba(255, 255, 255, 0.98);
    text-shadow: 0 6px 14px rgba(0, 0, 0, 0.45);
}

.welcome p {
    font-size: 1.5em;
    margin: 20px 0 40px;
    color: rgba(255, 255, 255, 0.9);
    text-shadow: 0 4px 10px rgba(0, 0, 0, 0.35);
}

.scroll-indicator {
    position: absolute;
    bottom: 30px;
    font-size: 1.2em;
    animation: bounce 2s infinite;
}

@keyframes bounce {
    0%, 20%, 50%, 80%, 100% { transform: translateY(0); }
    40% { transform: translateY(-10px); }
    60% { transform: translateY(-5px); }
}

.container {
    background: rgba(255, 255, 255, 0.98);
    padding: 42px 40px;
    width: 90%;
    max-width: 520px;
    margin: 50px auto;
    border-radius: 25px;
    box-shadow: 0 25px 50px rgba(0, 0, 0, 0.08);
    text-align: center;
    border: 1px solid rgba(255, 255, 255, 0.8);
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(-20px); }
    to { opacity: 1; transform: translateY(0); }
}

h2 {
    color: #4a5568;
    margin-bottom: 30px;
    font-size: 2.5em;
    font-weight: 300;
}

input[type="file"] {
    display: block;
    margin: 20px auto;
    padding: 14px 18px;
    border: 2px dashed rgba(128, 128, 255, 0.4);
    border-radius: 16px;
    background: rgba(255, 255, 255, 0.7);
    cursor: pointer;
    transition: all 0.25s ease;
    font-weight: 500;
    letter-spacing: 0.02em;
}

input[type="file"]:hover {
    border-color: rgba(255, 179, 255, 0.7);
    background: rgba(255, 255, 255, 0.85);
}

button {
    padding: 15px 34px;
    border: none;
    background: linear-gradient(135deg, #ffb3ff 0%, #c2f0ff 100%);
    color: #3a3a4d;
    border-radius: 999px;
    cursor: pointer;
    font-size: 1.1em;
    font-weight: 600;
    transition: all 0.25s ease;
    box-shadow: 0 12px 25px rgba(0, 0, 0, 0.08);
    letter-spacing: 0.02em;
}

button:hover {
    transform: translateY(-2px);
    box-shadow: 0 16px 30px rgba(0, 0, 0, 0.12);
    background: linear-gradient(135deg, #ffe6ff 0%, #e0ffff 100%);
}

#preview {
    display: block;
    margin: 30px auto 0;
    border-radius: 15px;
    max-width: 100%;
    height: auto;
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
    transition: all 0.3s ease;
}

#result {
    font-size: 1.2em;
    margin-top: 20px;
    font-weight: 600;
    color: #2d3748;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: white;
    padding: 20px;
    border-radius: 15px;
    box-shadow: 0 10px 30px rgba(102, 126, 234, 0.3);
    text-align: center;
    animation: highlight 0.5s ease-in;
}

@keyframes highlight {
    from { opacity: 0; transform: scale(0.9); }
    to { opacity: 1; transform: scale(1); }
}
</style>

</head>

<body>

<div class="welcome">
    <h1>Image Caption Generator</h1>
    <p>Upload an image and get an AI-generated caption instantly</p>
    <div class="scroll-indicator">Scroll down to start</div>
</div>

<div class="container">

<h2>Upload Your Image</h2>

<input type="file" id="imageInput">
<br><br>

<button onclick="previewImage()">Preview Image</button>
<br><br>

<button onclick="generateCaption()">Generate Caption</button>

<br><br>

<img id="preview" width="300" style="display: none;">

<p id="result" style="display: none;"></p>

</div>

<script>

function previewImage(){
    const fileInput = document.getElementById("imageInput");
    const preview = document.getElementById("preview");

    if (fileInput.files[0]) {
        preview.src = URL.createObjectURL(fileInput.files[0]);
        preview.style.display = "block";
    }
}

async function generateCaption(){
    const fileInput = document.getElementById("imageInput");
    const preview = document.getElementById("preview");
    const result = document.getElementById("result");

    if (!fileInput.files[0]) {
        alert("Please select an image first.");
        return;
    }

    // Ensure the image is shown even if the user didn't click Preview first
    preview.src = URL.createObjectURL(fileInput.files[0]);
    preview.style.display = "block";

    const formData = new FormData();
    formData.append("file", fileInput.files[0]);

    const response = await fetch("/predict", {
        method: "POST",
        body: formData
    });

    const data = await response.json();

    result.innerText = data.caption;
    result.style.display = "block";
}

</script>

</body>
</html>
